# =============================================================================
# Stack de producción del showroom KT GASTRO.
#
# Levantar:    docker compose up -d --build
# Logs:        docker compose logs -f
# Reiniciar:   docker compose restart backend
# Bajar:       docker compose down
#
# Antes del primer arranque copiar .env.example → .env y ajustar las variables.
#
# EN COOLIFY: se le asigna un DOMINIO solo al servicio `frontend` (su nginx
# proxea /api al backend por la red interna). El backend y MySQL NO se publican.
# Las variables sensibles se cargan en Environment Variables de Coolify.
#
# Acceso (Coolify):  https://<tu-dominio>            (todo entra por el frontend)
# Healthcheck:       https://<tu-dominio>/api/showroom/health
# =============================================================================

name: showroom

services:
  showroom-db:
    # Misma versión que el super-master para coherencia entre stacks. LTS hasta
    # abril 2032. Evitamos `latest` para que el rebuild sea reproducible.
    image: mysql:8.4
    container_name: showroom-db
    restart: unless-stopped
    # Tope de RAM del contenedor. La VPS (16 GB) hospeda 2 stacks full-stack
    # (showroom + super-master), cada uno con su MySQL: sin límites, un pico de
    # cualquiera puede disparar el OOM-killer. buffer-pool 512M + overhead ~1G.
    mem_limit: 1g
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: showroom
      TZ: America/Argentina/Buenos_Aires
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+00:00
      --innodb-buffer-pool-size=512M
      --max-connections=50
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - showroom-net
    healthcheck:
      # MYSQL_PWD (env, escapada como $$ para Compose) en vez de -p en la cmdline:
      # así el password NO queda visible en `ps`/`docker inspect` del proceso
      # mysqladmin. Mismo criterio que el sidecar de backup.
      test: ["CMD-SHELL", "MYSQL_PWD=\"$$MYSQL_ROOT_PASSWORD\" mysqladmin ping -h localhost -u root --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    # NO exponer el puerto de MySQL en un servidor público (Hetzner): sería un
    # ataque directo a la BD. Queda solo en la red interna de Docker; el backend
    # la alcanza por el hostname `mysql`. Para debug puntual desde tu máquina,
    # usá un túnel SSH:  ssh -L 3307:localhost:3306 usuario@servidor  y luego
    # entrás con DBeaver a localhost:3307 (docker exec expone 3306 dentro del host).
    # ports:
    #   - "127.0.0.1:3307:3306"   # <- solo si necesitás acceso local vía túnel

  # Backup diario de la BD. Sidecar que reutiliza la imagen mysql:8.4 (así
  # `mysqldump` coincide exacto con la versión del server) y corre un loop bash
  # que duerme hasta las 02:00, dumpea, comprime y rota.
  #
  # - Los dumps van a /data/showroom/backups del host (gzip). Restore:
  #     gunzip < /data/showroom/backups/showroom-XXXX.sql.gz | \
  #       docker compose exec -T showroom-db mysql -uroot -p"$MYSQL_ROOT_PASSWORD" showroom
  # - Retención: conserva los 7 dumps más recientes (los anteriores se borran).
  # - Solo corre mientras el stack está levantado: si la PC está apagada a las
  #   02:00, ese día se saltea (no hay catch-up).
  # - Backup on-demand: docker compose exec mysql-backup \
  #     bash -c 'mysqldump -h showroom-db -uroot --single-transaction --routines \
  #       --triggers --events --no-tablespaces showroom | gzip > /backups/manual-$(date +%Y%m%d-%H%M%S).sql.gz'
  #
  # OJO con el escaping: dentro de `command`, Compose interpola `$`, así que los
  # `$` de bash van duplicados como `$$` (Compose los colapsa a `$` al pasarlos).
  showroom-db-backup:
    image: mysql:8.4
    container_name: showroom-db-backup
    restart: unless-stopped
    # Sidecar liviano: solo duerme y corre mysqldump 1 vez/día.
    mem_limit: 256m
    depends_on:
      showroom-db:
        condition: service_healthy
    environment:
      # mysqldump lee el password de MYSQL_PWD — evita exponerlo en la cmdline.
      MYSQL_PWD: ${MYSQL_ROOT_PASSWORD}
      TZ: America/Argentina/Buenos_Aires
    volumes:
      - /data/showroom/backups:/backups
    networks:
      - showroom-net
    command:
      - bash
      - -c
      - |
        set -eo pipefail
        echo "[backup] sidecar iniciado - dump diario 02:00, retencion 7"
        while true; do
          now=$$(date +%s)
          next=$$(date -d "today 02:00" +%s)
          [ "$$next" -le "$$now" ] && next=$$(date -d "tomorrow 02:00" +%s)
          echo "[backup] durmiendo $$((next-now))s hasta la proxima corrida"
          sleep $$((next-now))
          file=/backups/showroom-$$(date +%Y%m%d-%H%M%S).sql.gz
          echo "[backup] generando $$file"
          if mysqldump -h showroom-db -u root --single-transaction --routines \
               --triggers --events --no-tablespaces showroom | gzip > "$$file" \
               && [ -s "$$file" ]; then
            echo "[backup] OK ($$(du -h "$$file" | cut -f1))"
            ls -1t /backups/showroom-*.sql.gz | tail -n +8 | xargs -r rm -f
          else
            echo "[backup] ERROR: dump fallido o vacio - conservo los anteriores"
            rm -f "$$file"
          fi
        done

  showroom-backend:
    build:
      context: ./showroom-backend
    image: showroom-backend:latest
    container_name: showroom-backend
    restart: unless-stopped
    # Tope de RAM del contenedor (defensa extra sobre el -Xmx1536m del Dockerfile).
    # Cubre heap 1.5G + metaspace/threads/off-heap de ZGC. Es el freno de cgroup
    # que faltaba: sin él, MaxRAMPercentage veía los 16 GB del host y el heap se
    # iba a ~12 GB → OOM. Ahora el heap es absoluto y además el contenedor topea acá.
    mem_limit: 2g
    depends_on:
      showroom-db:
        condition: service_healthy
    environment:
      # ---- BD ----
      # `allowPublicKeyRetrieval=true` es necesario con MySQL 8.x+ que usa
      # caching_sha2_password — sin SSL el driver no puede bajar la public key
      # del server para encriptar el password sin permiso explícito. En red
      # interna de Docker (no expuesta) el riesgo de MITM es nulo.
      SPRING_DATASOURCE_URL: jdbc:mysql://showroom-db:3306/showroom?createDatabaseIfNotExist=true&sslMode=DISABLED&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&rewriteBatchedStatements=true
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}

      # ---- Seguridad HTTPS (producción detrás del proxy TLS de Coolify) ----
      # Traefik termina el TLS y reenvía HTTP interno al stack. Con estas dos
      # vars Spring reconoce que el request original fue HTTPS (X-Forwarded-Proto)
      # y marca la cookie de sesión como Secure. En dev local (Windows, HTTP)
      # estas vars no existen y application.properties cae a false/none.
      SERVER_COOKIE_SECURE: ${SERVER_COOKIE_SECURE:-true}
      SERVER_FORWARD_HEADERS_STRATEGY: ${SERVER_FORWARD_HEADERS_STRATEGY:-framework}
      # Orígenes CORS permitidos (separados por coma). Completar en .env con el
      # dominio real, ej. https://showroom.tudominio.com. Vacío = solo
      # same-origin (el frontend y /api viven en el mismo dominio vía nginx, así
      # que la app funciona igual; el comodín público NO es seguro).
      SHOWROOM_CORS_ALLOWED_ORIGINS: ${SHOWROOM_CORS_ALLOWED_ORIGINS:-}

      # ---- DUX ----
      # Carpeta (montada :ro) con dux_tokens.json — ver volumen abajo.
      APP_SECRETS_DIR: /app/secrets
      # Los IDs de empresa/sucursal/depósito son CONFIG FIJA (no secretos) y
      # viven en application.properties (dux.empresa.*). No hace falta cargarlos
      # en Coolify. Descomentá alguno acá solo si necesitás pisarlo por entorno.
      # DUX_EMPRESA_ID: ${DUX_EMPRESA_ID}
      # DUX_EMPRESA_ID_SUCURSAL: ${DUX_EMPRESA_ID_SUCURSAL}
      # DUX_EMPRESA_ID_DEPOSITO: ${DUX_EMPRESA_ID_DEPOSITO:-0}
      # DUX_EMPRESA_CATEGORIA_FISCAL_DEFAULT: ${DUX_EMPRESA_CATEGORIA_FISCAL_DEFAULT:-CONSUMIDOR_FINAL}

      # ---- Imágenes de productos ----
      SHOWROOM_PRESUPUESTO_IMAGENES_FOLDER: /app/imagenes

      # ---- Logging a archivo ----
      # Spring Boot escribe acá con rotación (configurada en application.properties).
      # La carpeta /app/logs está montada en ./logs del host → leíble sin docker exec.
      # `LOGGING_FILE_NAME` es el binding oficial de Spring Boot para
      # `logging.file.name` (relaxed binding). No usamos un placeholder en
      # application.properties porque Logback se inicializa antes de que Spring
      # resuelva placeholders custom — y entonces el FileAppender no se crea.
      LOGGING_FILE_NAME: /app/logs/showroom-backend.log

      # ---- Email (credenciales SMTP) ----
      # Solo las credenciales. Todo lo demás (host/port, email-enabled, email-from,
      # el auto-send) vive en application.properties o se controla desde
      # /configuracion. Si email-from queda vacío, usa el username como remitente.
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      # WhatsApp y Pickit: deshabilitados por default en application.properties.
      # No van acá. Si algún día activás WhatsApp, agregá SHOWROOM_WHATSAPP_ENABLED,
      # SHOWROOM_WHATSAPP_PHONE_NUMBER_ID y SHOWROOM_WHATSAPP_ACCESS_TOKEN.

      TZ: America/Argentina/Buenos_Aires
    volumes:
      # Tokens DUX e imágenes — BIND MOUNTS a carpetas del host (compartidas con
      # SuperMaster), read-only. Van con ruta LITERAL (no `${VAR}`): Coolify solo
      # trata como bind mount los paths que empiezan con `/` o `.`; un `${VAR}`
      # lo convierte en un volumen nombrado VACÍO (y montaría /app/secrets e
      # /app/imagenes sin el dux_tokens.json ni las fotos). Las carpetas del
      # server las mantiene SuperMaster; acá solo se leen.
      - "/data/supermaster/secrets:/app/secrets:ro"
      - "/data/supermaster/imagenes:/app/imagenes:ro"
      # Logs persistentes en /data/showroom/logs del host. Sobrevive a
      # `docker compose down`. Útil
      # para diagnosticar incidentes pasados ("se cayó el sync ayer a la noche")
      # sin tener que entrar al contenedor.
      - "/data/showroom/logs:/app/logs"
      # Integración con el programa externo pickit-y-etiquetas (jar Java desktop).
      # `PICKIT_HOST_PATH` (en .env) apunta a una carpeta del host que contenga:
      #   - el .jar (compilado con mvn package)
      #   - Stock.xlsx y Combos.xlsx
      #   - subcarpeta de salida (típicamente "Pickits y Carros")
      # En la pantalla /configuracion los paths se ingresan como `/app/pickit/...`
      # (paths del container, no del host). Si no usás la integración, comentá
      # esta línea Y borrá `PICKIT_HOST_PATH` del .env — sino docker compose up
      # falla con "required variable PICKIT_HOST_PATH is missing".
      # DESHABILITADO en el server: Pickit es un .jar de escritorio Windows, no
      # aplica en Linux. Si algún día lo usás, descomentá y seteá PICKIT_HOST_PATH.
      # - "${PICKIT_HOST_PATH}:/app/pickit"
    # Solo `expose`: el puerto queda visible en la red interna de Docker (para
    # que el nginx del frontend lo proxee) pero NO se publica al host. En un
    # servidor público exponerlo sería superficie de ataque innecesaria.
    expose:
      - "8081"
    networks:
      - showroom-net
    healthcheck:
      # Endpoint propio de la app — no requiere Spring Actuator. curl viene
      # instalado en el Dockerfile del backend.
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/api/showroom/health || exit 1"]
      interval: 15s
      # 10s (no 5s): el endpoint hace un count() a la BD; durante el sync de
      # catálogo (escrituras masivas) puede tardar más de 5s y marcar el
      # contenedor unhealthy justo cuando está ocupado, disparando una recreación
      # innecesaria en Coolify. 10s da margen sin enmascarar una caída real.
      timeout: 10s
      retries: 5
      start_period: 60s
    # El backend NO necesita puerto público: el nginx del frontend lo proxea por
    # la red interna de Docker (proxy_pass http://showroom-backend:8081). Exponerlo
    # en un servidor público sería una superficie de ataque innecesaria (CORS, /api
    # sin el nginx delante). Para debug local usá
    # `docker compose exec showroom-backend ...` o un túnel SSH.
    # ports:
    #   - "127.0.0.1:8081:8081"

  showroom-frontend:
    build:
      context: ./showroom-frontend
    image: showroom-frontend:latest
    container_name: showroom-frontend
    restart: unless-stopped
    # nginx sirviendo estáticos + proxy: liviano.
    mem_limit: 128m
    depends_on:
      - showroom-backend
    # En Coolify NO se publica el puerto: se le asigna un DOMINIO al servicio y
    # su proxy (Traefik) rutea el tráfico + gestiona el certificado Let's Encrypt.
    # Coolify detecta el puerto interno del container (80) automáticamente.
    # Dejá esta línea comentada en el server; descomentala solo para un deploy
    # sin Coolify (docker compose "pelado") donde quieras publicar el puerto.
    # ports:
    #   - "4200:80"
    expose:
      - "80"
    networks:
      - showroom-net

volumes:
  mysql-data:

networks:
  showroom-net:
    driver: bridge
