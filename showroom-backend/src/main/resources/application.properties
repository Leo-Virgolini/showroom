spring.application.name=showroom-backend
server.port=8081

# ============================================================
# Secretos locales de desarrollo
# ============================================================
# En DEV (Windows) los secretos reales (App Password de Gmail, etc.) viven en
# `application-local.properties` — un archivo gitignored que NO se commitea y
# que pisa los valores de acá. En PRODUCCIÓN (Coolify) ese archivo no existe y
# los secretos entran por env var (SPRING_MAIL_PASSWORD, etc.). `optional:`
# hace que la ausencia del archivo no rompa el arranque.
spring.config.import=optional:classpath:application-local.properties

# ============================================================
# Sesiones HTTP (autenticación con cookie SESSION de Spring Session)
# ============================================================
# 30 días — operador hace login una vez al mes. Cookie HttpOnly, no expuesta
# a JavaScript. Las sesiones se PERSISTEN en MySQL (Spring Session JDBC)
# así sobreviven reinicios del backend: si el container se rebuildea o
# crashea, los operadores siguen logueados al volver a estar disponible.
server.servlet.session.timeout=30d
# La cookie sobrevive al cierre del browser (sino sería sesión).
server.servlet.session.cookie.max-age=30d
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
# Cookie `Secure`: solo se envía sobre HTTPS. En DEV (Windows, HTTP) queda en
# false o el browser nunca manda la cookie y el login se rompe. En PRODUCCIÓN
# (Docker/Coolify detrás de TLS) el compose setea SERVER_COOKIE_SECURE=true.
server.servlet.session.cookie.secure=${SERVER_COOKIE_SECURE:false}
# Backend de sesión: JDBC sobre el mismo datasource de la app. El starter
# `spring-boot-starter-session-jdbc` aplica @EnableJdbcHttpSession via
# auto-config; basta con setear las properties acá.
# `initialize-schema=always` crea las tablas SPRING_SESSION + SPRING_SESSION_ATTRIBUTES
# al arrancar usando el script bundleado para MySQL (default es `embedded`,
# que solo crea en DBs in-memory como H2). Es idempotente: en reinicios
# sucesivos detecta que la tabla ya existe y no hace nada.
spring.session.jdbc.initialize-schema=always
# Cleanup de sesiones expiradas — cada 1h Spring barre las que pasaron del
# timeout. Default es 1m que es agresivo para una app de pocos usuarios.
spring.session.jdbc.cleanup-cron=0 0 * * * *

# ============================================================
# Virtual Threads (JDK 21+, optimizado en JDK 24/25)
# ============================================================
# Habilita virtual threads para Tomcat (1 vthread por request HTTP) y para el
# TaskExecutor de @Async. Workload de este backend es 100% I/O-bound:
#   - Llamadas a DUX (~7s por request por rate limit)
#   - Queries a MySQL (HikariCP)
#   - Envío de emails SMTP
# Con virtual threads escalamos a miles de requests concurrentes sin saturar
# el pool fijo de Tomcat (default 200). En JDK 24+ los `synchronized` no
# pinnean el carrier thread (JEP 491), así que los locks existentes siguen
# funcionando sin tocar el código.
spring.threads.virtual.enabled=true
# Con virtual threads + @Scheduled (HorarioSyncSchedulerService corre la sync
# diaria a las 6 AM), el scheduler corre en un virtual thread que es daemon.
# Si en algún momento todos los platform threads (Tomcat acceptor, etc.)
# terminaran, la JVM se cerraría aunque haya tareas programadas pendientes.
# `keep-alive=true` mantiene un non-daemon thread vivo como red de seguridad.
# Recomendación oficial de Spring Boot al combinar virtual threads + scheduling.
spring.main.keep-alive=true

# ============================================================
# MySQL
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/showroom?createDatabaseIfNotExist=true&sslMode=DISABLED&allowPublicKeyRetrieval=true&connectionTimeZone=America/Argentina/Buenos_Aires&characterEncoding=UTF-8&rewriteBatchedStatements=true
spring.datasource.username=root
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Persistir todos los Instant en UTC y leer como UTC. El frontend convierte a la TZ
# del browser para mostrar (toLocaleString aplica AR automático en máquinas locales).
# Sin esto, Hibernate guardaba en AR pero leía como UTC → desfase de 3 hs en el render.
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.timezone.default_storage=NORMALIZE_UTC
# Batching: agrupa inserts/updates en lotes de 50 y reordena para maximizar el batching.
# Crítico para el sync de catálogo (5000+ productos): pasa de ~5000 round-trips a ~100.
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true
# Desactivamos Open-Session-In-View (anti-pattern para APIs REST). Con OSIV
# habilitado por default, Hibernate mantiene la conexión DB abierta durante
# todo el rendering del response y promueve N+1 queries silenciosas durante
# la serialización JSON. Acá los controllers devuelven SOLO DTOs (no entities
# crudas) y los queries que necesitan asociaciones usan @EntityGraph o
# `JOIN FETCH` explícito, así que es seguro desactivarlo. Bonus: elimina el
# WARN recurrente "spring.jpa.open-in-view is enabled by default" del startup.
spring.jpa.open-in-view=false

# ============================================================
# HTTP clients globales (RestClient/RestTemplate)
# ============================================================
# Timeouts aplicados a TODOS los RestClient.Builder autoconfigurados que se
# inyectan en la app (DUX, WhatsApp Business). 10s para abrir conexion (red
# corporativa lenta o DNS frio) y 30s para esperar respuesta (DUX a veces
# tarda bajo carga; Meta tambien al subir el PDF). Spring Boot 4 aplica
# estos defaults via HttpClientSettings al ClientHttpRequestFactory
# auto-detectado (JDK HttpClient en nuestro classpath).
spring.http.clients.connect-timeout=10s
spring.http.clients.read-timeout=30s

# ============================================================
# Proxy / forwarded headers (producción detrás de TLS)
# ============================================================
# En producción Coolify (Traefik) termina el TLS y reenvía HTTP interno al
# stack. Sin esto Spring cree que el request original fue HTTP y no marca la
# cookie Secure ni arma bien las URLs absolutas. `framework` hace que Spring
# respete X-Forwarded-Proto/Host/For. El compose setea
# SERVER_FORWARD_HEADERS_STRATEGY=framework. En DEV local queda `none`.
server.forward-headers-strategy=${SERVER_FORWARD_HEADERS_STRATEGY:none}

# ============================================================
# CORS
# ============================================================
# Orígenes permitidos (lista separada por comas). DEV/LAN: comodín para que el
# showroom sea accesible por IP/hostname/localhost. PRODUCCIÓN: el compose
# setea SHOWROOM_CORS_ALLOWED_ORIGINS=https://showroom.tudominio.com — el
# comodín NO es seguro público con allowCredentials=true.
showroom.cors.allowed-origins=${SHOWROOM_CORS_ALLOWED_ORIGINS:http://*:*,https://*:*}

# ============================================================
# DUX
# ============================================================
# Defaults razonables (base-url, rate-limit, items-per-page, lista-precios-nombre,
# categoria-fiscal-default) viven en DuxProperties. Acá solo se setean los valores
# que dependen del entorno/cuenta DUX y no tienen default sensato.
#
# Tokens persistentes - se reusan los de super-master (misma PC).
app.secrets-dir=C:/ProgramData/SuperMaster/secrets

# Datos de empresa para crear pedidos (consultar GET /empresas y
# GET /sucursales en DUX para los IDs reales de la cuenta).
dux.empresa.id=1068
# Sucursal 3 = KT GASTRO (la del showroom).
dux.empresa.id-sucursal=3
# La cuenta no maneja stock por depósito; se omite del payload si es 0.
dux.empresa.id-deposito=0
# SKU del item comodín en DUX para productos que no están en catálogo KT GASTRO
# pero el operador puede cargar al pedido con precio y descripción libre (en el
# campo comentarios de la línea). Default 9999990 — cambiar solo si DUX lo renombra.
dux.sku-producto-generico=9999990
# NOTA: DUX no permite setear el vendedor vía POST /pedido/nuevopedido (probado
# el 2026-04-29). Siempre asigna el default atado al token o sucursal. La
# operadora cambia el vendedor manualmente en DUX al editar el comprobante.
#
# Los horarios de sincronización automática viven en la tabla horario_sync y
# se gestionan desde la pantalla de configuración (HorarioSyncSchedulerService).
# Si la tabla está vacía, no hay sync automática — solo manual.

# ============================================================
# Imágenes de productos - Carpeta local con un archivo por SKU.
# Formatos soportados: jpg, jpeg, png, webp, gif, bmp (case-insensitive).
# Ej: "1011018.jpg". La misma carpeta sirve a:
#  - GET /api/showroom/productos/{sku}/imagen (frontend)
#  - PresupuestoPdfGenerator (PDF de pedido)
# Al startup se construye un índice {sku → File} en memoria para que el
# lookup sea O(1) aunque haya decenas de miles de archivos. Para captar
# imágenes nuevas sin reiniciar: POST /api/showroom/imagenes/reindex.
#
# Este valor es SOLO para desarrollo local (mvn spring-boot:run). En producción
# corre en Docker y la env var SHOWROOM_PRESUPUESTO_IMAGENES_FOLDER=/app/imagenes
# (docker-compose.yml) pisa este valor; la carpeta real del host es el bind mount
# /data/supermaster/imagenes hardcodeado en docker-compose.yml (compartido con
# SuperMaster, read-only). Por eso acá va directo el path de la PC de dev.
# ============================================================
showroom.presupuesto.imagenes-folder=G:/.shortcut-targets-by-id/1O_lJSVDiXSJ37_IgSVh5AScFhc-hBWPt/IMAGENES

# ============================================================
# Email - Presupuesto del pedido
# Después de cada pedido confirmado en DUX, se manda por email el presupuesto
# en PDF al destinatario configurado.
# Para Gmail: dejar host/port/auth/starttls como están. SOLO completar:
#   - spring.mail.username: tu Gmail (la cuenta que envía)
#   - spring.mail.password: App Password de 16 dígitos (NO tu password real
#     de Gmail; generalo en myaccount.google.com/apppasswords)
# email-from: opcional. Si lo dejás vacío, usa spring.mail.username.
#
# Destinatario (email-to): se configura desde la pantalla /configuracion y
# se persiste en la tabla `configuracion`. Acá ya no se setea — la primera
# vez que se levanta la app hay que setearlo desde la UI (sino el envío
# queda deshabilitado y el pedido se crea igual en DUX).
# ============================================================
showroom.picking.email-enabled=true
showroom.picking.email-from=${SHOWROOM_PICKING_EMAIL_FROM:}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
# timeout/writetimeout generosos: el PDF de presupuesto puede pesar varios MB
# (imágenes de productos embebidas), y subirlo a Gmail puede tardar decenas de
# segundos en redes con upload modesto. Además del upload, Gmail puede tardar
# en mandar el ACK final (250 OK) cuando el adjunto es grande. 3 minutos cubre
# upload + ACK con margen — si se dispara, el pedido ya está en DUX pero el
# operador ve el toast de error.
spring.mail.properties.mail.smtp.timeout=180000
spring.mail.properties.mail.smtp.writetimeout=180000
# Bypass del trust store del JVM SOLO para smtp.gmail.com — necesario cuando la red
# tiene SSL inspection (proxy corporativo) o el JVM no tiene actualizadas las CAs
# de Google. Limita el "trust unknown CA" a ese host, no global → seguro.
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# ============================================================
# WhatsApp Business (Meta Cloud API) — envío del PDF de follow-up
#
# Sirve para que el cliente reciba por WhatsApp el mismo PDF que se le
# manda por email (productos vistos pero no comprados). Estrategia
# "free-form within 24h window": solo manda mensajes sin template aprobado
# si el cliente escribió a este número en las últimas 24hs. Si la ventana
# está cerrada, Meta tira error 131047 y el frontend muestra un toast
# "WhatsApp fuera de ventana 24hs".
#
# Setup:
#  1) En Meta Business Manager, anotar el `phone_number_id` del WABA.
#  2) Crear (o usar) un USUARIO DEL SISTEMA en Configuración del negocio →
#     Usuarios del sistema. Si es nuevo, asignarle acceso a la WABA en
#     Cuentas → Cuentas de WhatsApp → Acceso a la cuenta de WhatsApp.
#  3) Generar el token con el botón "Generar token" del usuario del sistema,
#     seleccionando la app y los 3 permisos:
#       - business_management
#       - whatsapp_business_management
#       - whatsapp_business_messaging
#     Elegir "Sin caducidad" para que no expire (es System Token, no User Token).
#  4) Cargar phone-number-id y access-token vía env vars (NO commitear acá).
# ============================================================
showroom.whatsapp.enabled=false
showroom.whatsapp.phone-number-id=
showroom.whatsapp.access-token=
showroom.whatsapp.api-version=v25.0
showroom.whatsapp.default-country-code=54
# Mensaje (caption) del PDF — se configura desde la pantalla /configuracion
# (la fila va a la tabla configuracion). Si no hay mensaje configurado, el PDF
# se manda sin caption.

# ============================================================
# Logging
# ============================================================
logging.level.ar.com.leo.showroom=INFO
logging.level.org.springframework.web=INFO

# Logging a archivo. En dev local no se setea ningun path → queda solo en consola.
# En Docker el compose pasa la env var oficial LOGGING_FILE_NAME=/app/logs/showroom-backend.log
# (binding directo a logging.file.name, sin placeholder en este archivo: Logback se
# inicializa antes que el resolver de placeholders custom de Spring, y por eso un
# ${LOG_FILE_PATH:} no llegaba a crear el FileAppender).
# Montamos la carpeta en el host para poder leer los logs sin docker exec.
#
# Rotacion: el archivo activo es showroom-backend.log; al cambiar de dia (o al
# llegar a 10MB intra-dia) se renombra a showroom-backend.YYYY-MM-DD.<n>.gz.
# Retention 7 dias: archivos mas viejos se borran automaticamente. Total cap
# de 100MB es defensa adicional contra explosion por bug que loguee mucho.
# Si necesitas ampliar el periodo, subi max-history (es en dias cuando el
# file-name-pattern incluye %d, que es el default de Spring Boot).
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.total-size-cap=100MB
# Patron uniforme entre consola y archivo. Incluye el thread porque ayuda a
# distinguir el sync (corre en async pool) de las requests HTTP normales.
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
