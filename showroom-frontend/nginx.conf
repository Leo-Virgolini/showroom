# Preserva el X-Forwarded-Proto original. En producción Coolify (Traefik)
# termina el TLS y llega a este nginx por HTTP con X-Forwarded-Proto=https;
# NO hay que pisarlo con $scheme (que acá siempre es "http") o el backend nunca
# se entera de que el request original fue HTTPS y la cookie Secure no viaja.
# Si no viene el header (acceso directo en LAN/dev), cae a $scheme.
map $http_x_forwarded_proto $forwarded_proto {
    default $scheme;
    ~.      $http_x_forwarded_proto;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Tamaño máximo de payload (por las dudas con pedidos grandes)
    client_max_body_size 10m;

    # Stream SSE de eventos del sync — REQUIERE buffering off para que los
    # eventos lleguen en tiempo real al navegador, no en bloques de 8KB.
    # Match exacto antes de la regla genérica de /api/.
    location = /api/showroom/events {
        proxy_pass http://showroom-backend:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;     # SSE es persistente — no cortar
        chunked_transfer_encoding off;
    }

    # Stream SSE del visor por operador (/api/showroom/visor/{username}/events).
    # Mismos flags que el SSE del sync: sin esto el celular del cliente recibe
    # los scans a los tirones (buffering) y se desconecta cada 2 min (timeout de
    # la regla genérica). El regex matchea solo el sub-path /events del visor —
    # el resto de /visor/* (sesion/activa, agregar-carrito) sigue por /api/.
    location ~ ^/api/showroom/visor/[^/]+/events$ {
        proxy_pass http://showroom-backend:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;     # SSE es persistente — no cortar
        chunked_transfer_encoding off;
    }

    # Proxy al backend Spring Boot para el resto del API
    location /api/ {
        proxy_pass http://showroom-backend:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Service worker y manifest no se cachean (PWA)
    location = /ngsw-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }
    location = /ngsw.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Assets con hash → cache largo
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fallback SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
