# Preserva el X-Forwarded-Proto original. En producción Coolify (Traefik)
# termina el TLS y llega a este nginx por HTTP con X-Forwarded-Proto=https;
# NO hay que pisarlo con $scheme (que acá siempre es "http") o el backend nunca
# se entera de que el request original fue HTTPS y la cookie Secure no viaja.
# Si no viene el header (acceso directo en LAN/dev), cae a $scheme.
map $http_x_forwarded_proto $forwarded_proto {
    default $scheme;
    ~.      $http_x_forwarded_proto;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Headers de seguridad. `always` para que apliquen también a respuestas de
    # error. NO se incluye HSTS a propósito: el visor/QR se accede por IP en HTTP
    # dentro de la LAN, y Strict-Transport-Security forzaría HTTPS y rompería ese
    # acceso. En prod el TLS lo termina Traefik por delante.
    add_header X-Frame-Options "SAMEORIGIN" always;      # anti-clickjacking de la pantalla de precios
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Tamaño máximo de payload (por las dudas con pedidos grandes)
    client_max_body_size 10m;

    # --- Resolución DINÁMICA del backend (sobrevive a redeploys) ---
    # 127.0.0.11 es el DNS embebido de Docker. Sin este `resolver` + la variable
    # `$backend` de abajo, nginx resolvería `showroom-backend` UNA sola vez al
    # arrancar y cachearía esa IP para siempre; cuando el backend se redespliega
    # Docker le asigna una IP nueva y este nginx seguiría apuntando a la vieja
    # (muerta) → 504 hasta reiniciar el frontend. Al usar el hostname a través de
    # una VARIABLE en `proxy_pass`, nginx re-resuelve el DNS en runtime (según el
    # `valid=` del resolver), así el proxy sigue al backend aunque cambie de IP.
    # `ipv6=off` evita el lookup AAAA innecesario (la red de Docker es IPv4).
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend "showroom-backend:8081";

    # Stream SSE de eventos del sync — REQUIERE buffering off para que los
    # eventos lleguen en tiempo real al navegador, no en bloques de 8KB.
    # Match exacto antes de la regla genérica de /api/.
    location = /api/showroom/events {
        proxy_pass http://$backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;     # SSE es persistente — no cortar
        chunked_transfer_encoding off;
    }

    # Stream SSE del visor por sesión (/api/showroom/visor/t/{token}/events).
    # Mismos flags que el SSE del sync: sin esto el celular del cliente recibe
    # los scans a los tirones (buffering) y se desconecta cada 2 min (timeout de
    # la regla genérica). El regex matchea solo el sub-path /events del visor —
    # el resto de /visor/t/{token}/* (sesion, presupuesto, bootstrap, imagen,
    # agregar-carrito) sigue por /api/. OJO: la ruta lleva el token efímero
    # (`/visor/t/{token}/events`), NO el username — si volvés al esquema viejo
    # de 2 segmentos este regex deja de matchear y el visor cae al bloque
    # genérico (buffering on + timeout 120s) y se corta cada 2 min.
    location ~ ^/api/showroom/visor/t/[^/]+/events$ {
        proxy_pass http://$backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;     # SSE es persistente — no cortar
        chunked_transfer_encoding off;
    }

    # Proxy al backend Spring Boot para el resto del API
    location /api/ {
        proxy_pass http://$backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        # 300s (no 120s): una operación que encadena varias llamadas a DUX (alta de
        # pedido, o el primer listado de localidades de una provincia nueva que
        # pagina DUX a 1 req/7s) puede superar 120s y devolver un 504 espurio. DUX
        # está rate-limited del lado del backend, así que estas esperas son legítimas.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Service worker y manifest no se cachean (PWA)
    location = /ngsw-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }
    location = /ngsw.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Assets con hash → cache largo
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fallback SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
