<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo: rounded square con el color primary del tema Aura -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="#10b981"/>

  <!-- Finder patterns (los tres cuadrados grandes típicos de un QR) -->
  <g fill="#ffffff">
    <!-- Top-left finder -->
    <path d="M88 88 h120 v120 h-120 z M112 112 v72 h72 v-72 z" fill-rule="evenodd"/>
    <rect x="128" y="128" width="40" height="40" rx="4"/>

    <!-- Top-right finder -->
    <path d="M304 88 h120 v120 h-120 z M328 112 v72 h72 v-72 z" fill-rule="evenodd"/>
    <rect x="344" y="128" width="40" height="40" rx="4"/>

    <!-- Bottom-left finder -->
    <path d="M88 304 h120 v120 h-120 z M112 328 v72 h72 v-72 z" fill-rule="evenodd"/>
    <rect x="128" y="344" width="40" height="40" rx="4"/>
  </g>

  <!-- Módulos QR estilizados en la zona de datos (simulan el patrón de un QR real) -->
  <g fill="#ffffff">
    <!-- Timing pattern + datos representativos -->
    <rect x="232" y="88" width="24" height="24" rx="3"/>
    <rect x="280" y="88" width="24" height="24" rx="3"/>

    <rect x="232" y="136" width="24" height="24" rx="3"/>
    <rect x="280" y="160" width="24" height="24" rx="3"/>

    <rect x="232" y="208" width="24" height="24" rx="3"/>
    <rect x="280" y="208" width="24" height="24" rx="3"/>
    <rect x="328" y="232" width="24" height="24" rx="3"/>
    <rect x="376" y="232" width="24" height="24" rx="3"/>

    <rect x="88" y="232" width="24" height="24" rx="3"/>
    <rect x="136" y="232" width="24" height="24" rx="3"/>
    <rect x="184" y="232" width="24" height="24" rx="3"/>

    <rect x="232" y="280" width="24" height="24" rx="3"/>
    <rect x="280" y="280" width="24" height="24" rx="3"/>
    <rect x="328" y="280" width="24" height="24" rx="3"/>
    <rect x="376" y="280" width="24" height="24" rx="3"/>
    <rect x="424" y="280" width="24" height="24" rx="3"/>

    <rect x="232" y="328" width="24" height="24" rx="3"/>
    <rect x="280" y="328" width="24" height="24" rx="3"/>
    <rect x="376" y="328" width="24" height="24" rx="3"/>
    <rect x="424" y="328" width="24" height="24" rx="3"/>

    <rect x="232" y="376" width="24" height="24" rx="3"/>
    <rect x="328" y="376" width="24" height="24" rx="3"/>
    <rect x="376" y="376" width="24" height="24" rx="3"/>

    <rect x="280" y="424" width="24" height="24" rx="3"/>
    <rect x="328" y="424" width="24" height="24" rx="3"/>
    <rect x="424" y="424" width="24" height="24" rx="3"/>
  </g>
</svg>
