<p-toast position="top-center" />

<div class="min-h-screen flex flex-col items-center justify-center bg-gradient-to-br from-orange-50 via-white to-orange-50 dark:from-surface-950 dark:via-surface-900 dark:to-surface-950 p-4">
  <div class="h-1.5 w-full max-w-md bg-gradient-to-r from-[#FF861C] via-[#a2ab00] to-[#7EBA00] rounded-full mb-6"></div>

  <p-card class="w-full max-w-md">
    <ng-template #header>
      <div class="flex flex-col items-center gap-3 pt-6 pb-2">
        <img src="kt-gastro-logo.webp" alt="Kitchen Tools Gastronomía" class="h-16 sm:h-20 object-contain" />
        <div class="flex flex-col items-center leading-tight">
          <span class="text-xl font-bold text-[#3B1E09] dark:text-surface-0">Showroom</span>
          <span class="text-xs font-semibold text-[#3B1E09]/70 dark:text-muted-color tracking-[0.2em] uppercase">
            Iniciar sesión
          </span>
        </div>
      </div>
    </ng-template>

    <form (ngSubmit)="submit()" class="flex flex-col gap-4">
      <div class="flex flex-col gap-1.5">
        <label for="usernameInput" class="text-sm font-medium text-muted-color">Usuario</label>
        <p-iconfield class="w-full">
          <p-inputicon class="pi pi-user" />
          <input
            pInputText
            id="usernameInput"
            type="text"
            [ngModel]="username()"
            (ngModelChange)="username.set($event)"
            name="username"
            autocomplete="username"
            autofocus
            class="w-full"
            [disabled]="cargando()"
          />
        </p-iconfield>
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="passwordInput" class="text-sm font-medium text-muted-color">Contraseña</label>
        <div class="relative w-full">
          <input
            pInputText
            id="passwordInput"
            [type]="mostrarPassword() ? 'text' : 'password'"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            name="password"
            autocomplete="current-password"
            class="w-full pr-10"
            [disabled]="cargando()"
          />
          <button
            type="button"
            class="absolute right-2 top-1/2 -translate-y-1/2 p-1 text-muted-color hover:text-surface-700 dark:hover:text-surface-200 cursor-pointer bg-transparent border-0"
            (click)="mostrarPassword.set(!mostrarPassword())"
            [attr.aria-label]="mostrarPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'">
            <i [class]="mostrarPassword() ? 'pi pi-eye-slash' : 'pi pi-eye'"></i>
          </button>
        </div>
      </div>

      <p-button
        label="Iniciar sesión"
        icon="pi pi-sign-in"
        type="submit"
        size="large"
        [loading]="cargando()"
        class="w-full"
      />
    </form>
  </p-card>
</div>
